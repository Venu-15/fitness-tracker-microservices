services:
  postgres:
    image: postgres:16
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: fitness-micro-user
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: fitness-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    container_name: fitness-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: fitness-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8181:8080"
    volumes:
      - ./keycloak-realm-export.json:/opt/keycloak/data/import/fitness-app-realm.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  eureka:
    build: ./eureka
    container_name: fitness-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8761/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  configserver:
    build: ./configserver
    container_name: fitness-configserver
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8888/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  userservice:
    build: ./userservice
    container_name: fitness-userservice
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
      configserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  activityservice:
    build: ./activityservice
    container_name: fitness-activityservice
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka:
        condition: service_healthy
      configserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8082/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  aiservice:
    build: ./aiservice
    container_name: fitness-aiservice
    ports:
      - "8083:8083"
    environment:
      GEMINI_URL: ${GEMINI_URL}
      GEMINI_KEY: ${GEMINI_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka:
        condition: service_healthy
      configserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  gateway:
    build: ./gateway
    container_name: fitness-gateway
    ports:
      - "8080:8080"
    depends_on:
      keycloak:
        condition: service_healthy
      eureka:
        condition: service_healthy
      configserver:
        condition: service_healthy
      userservice:
        condition: service_healthy
      activityservice:
        condition: service_healthy
      aiservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  frontend:
    build: ./fitness-frontend
    container_name: fitness-frontend
    ports:
      - "5173:5173"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
